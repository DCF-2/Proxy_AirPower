<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirPower | Painel de Redes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar navbar-dark bg-primary shadow-sm mb-4">
    <div class="container">
        <a class="navbar-brand" href="#">
            <i class="bi bi-wifi"></i> AirPower Admin
        </a>
        <div class="d-flex align-items-center">
            <span class="navbar-text text-light me-3 d-none d-md-block">Gestão de Provisionamento ESP32</span>
            <a href="/perform_logout" class="btn btn-sm btn-outline-light text-white">
                <i class="bi bi-box-arrow-right"></i> Sair
            </a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row g-4">

        <div class="col-lg-4">
            <div class="card custom-card">
                <div class="card-header bg-transparent border-0 pt-4 pb-0">
                    <h5 class="card-title fw-bold"><i class="bi bi-plus-circle"></i> Adicionar Rede</h5>
                </div>
                <div class="card-body">
                    <form id="wifiForm">
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="ssid" placeholder="Nome" required>
                            <label for="ssid">SSID (Nome da Rede)</label>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="password" placeholder="Senha" required>
                            <label for="password">Senha (Password)</label>
                        </div>
                        <div class="form-floating mb-4">
                            <input type="text" class="form-control" id="description" placeholder="Local" required>
                            <label for="description">Descrição / Local</label>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
                            <i class="bi bi-save"></i> Registar Rede
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="card custom-card h-100">
                <div class="card-header bg-transparent border-0 pt-4 pb-0 d-flex justify-content-between align-items-center">
                    <h5 class="card-title fw-bold"><i class="bi bi-list-ul"></i> Redes Autorizadas</h5>
                    <button class="btn btn-sm btn-outline-secondary" onclick="loadNetworks()">
                        <i class="bi bi-arrow-clockwise"></i> Atualizar
                    </button>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                            <tr>
                                <th>SSID</th>
                                <th>Senha</th>
                                <th>Localização</th>
                                <th class="text-end">Ações</th>
                            </tr>
                            </thead>
                            <tbody id="networkTableBody">
                            </tbody>
                        </table>
                    </div>

                    <div id="emptyState" class="text-center py-5 text-muted d-none">
                        <i class="bi bi-wifi-off fs-1"></i>
                        <p class="mt-2">Nenhuma rede registada ainda.</p>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="/js/app.js"></script>
</body>
</html>
